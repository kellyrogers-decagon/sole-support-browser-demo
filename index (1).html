<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sole Support — Order Resolution</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#2A1B1E;
    --ink-soft:#8A6A6F;
    --paper:#F6EEEF;
    --surface:#FFFFFF;
    --border:#E7D9DB;
    --sidebar:#3A141E;
    --sidebar-text:#C9A2A9;
    --sidebar-text-active:#F7ECEE;
    --gold:#A63D4F;
    --status-open-bg:#FBEEDD; --status-open-text:#7A4A12;
    --status-resolved-bg:#E4F0E8; --status-resolved-text:#1F4A30;
    --status-escalated-bg:#FBE7E4; --status-escalated-text:#7A2419;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:'IBM Plex Sans',sans-serif;color:var(--ink);background:var(--paper);}
  .display{font-family:'Fraunces',serif;}
  .mono{font-family:'IBM Plex Mono',monospace;}
  a{color:inherit;text-decoration:none;}

  .app{display:flex;min-height:100vh;}

  /* Sidebar */
  .sidebar{width:230px;background:var(--sidebar);color:var(--sidebar-text);flex-shrink:0;padding:28px 18px;display:flex;flex-direction:column;gap:28px;}
  .brand{display:flex;align-items:center;gap:10px;}
  .brand-mark{width:30px;height:30px;border-radius:6px;background:var(--gold);color:var(--sidebar);display:flex;align-items:center;justify-content:center;font-family:'Fraunces',serif;font-weight:600;font-size:16px;}
  .brand-name{font-family:'Fraunces',serif;font-size:17px;color:var(--sidebar-text-active);line-height:1.15;}
  .brand-name small{display:block;font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.08em;color:var(--sidebar-text);text-transform:uppercase;margin-top:2px;}
  .nav{display:flex;flex-direction:column;gap:2px;}
  .nav-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:7px;font-size:13.5px;color:var(--sidebar-text);cursor:pointer;}
  .nav-item svg{width:15px;height:15px;flex-shrink:0;}
  .nav-item.active{background:rgba(243,241,230,0.08);color:var(--sidebar-text-active);font-weight:500;}
  .nav-item:hover{color:var(--sidebar-text-active);}

  .order-search{margin-top:4px;padding-top:20px;border-top:1px solid rgba(255,255,255,0.08);}
  .order-search label{display:block;font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--sidebar-text);margin-bottom:8px;}
  .order-search-row{display:flex;gap:6px;}
  .order-search-row input{flex:1;font-family:'IBM Plex Mono',monospace;font-size:12.5px;padding:8px 10px;border-radius:7px;border:1px solid rgba(255,255,255,0.14);background:rgba(255,255,255,0.06);color:var(--sidebar-text-active);}
  .order-search-row input::placeholder{color:var(--sidebar-text);opacity:.7;}
  .order-search-row input:focus{outline:none;border-color:var(--gold);}
  .order-search-go{flex-shrink:0;width:34px;border-radius:7px;border:1px solid rgba(255,255,255,0.14);background:rgba(255,255,255,0.06);color:var(--sidebar-text-active);cursor:pointer;display:flex;align-items:center;justify-content:center;}
  .order-search-go:hover{background:var(--gold);border-color:var(--gold);color:#FBEEF0;}
  .order-search-go svg{width:14px;height:14px;}
  .order-search-hint{min-height:16px;font-size:11px;margin-top:7px;color:#E9A9B4;}

  /* Main */
  .main{flex:1;padding:34px 44px;max-width:1180px;}
  .topline{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:22px;}
  .crumbs{font-size:12px;color:var(--ink-soft);margin-bottom:6px;}
  h1{font-family:'Fraunces',serif;font-size:28px;margin:0;font-weight:600;}
  .sub{color:var(--ink-soft);font-size:13px;margin-top:6px;}
  .sub .mono{color:var(--ink);}

  .badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11.5px;font-weight:600;letter-spacing:.02em;vertical-align:middle;margin-left:10px;}
  .badge.open{background:var(--status-open-bg);color:var(--status-open-text);}
  .badge.resolved{background:var(--status-resolved-bg);color:var(--status-resolved-text);}
  .badge.escalated{background:var(--status-escalated-bg);color:var(--status-escalated-text);}

  .btn{font-family:'IBM Plex Sans',sans-serif;font-size:13px;font-weight:600;padding:9px 16px;border-radius:8px;border:1px solid var(--border);background:var(--surface);cursor:pointer;display:inline-flex;align-items:center;gap:7px;}
  .btn:hover{border-color:var(--ink-soft);}
  .btn-primary{background:var(--sidebar);color:var(--sidebar-text-active);border-color:var(--sidebar);}
  .btn-gold{background:var(--gold);color:#FBEEF0;border-color:var(--gold);}
  .btn-row{display:flex;gap:10px;}

  /* Dashboard table */
  .card{background:var(--surface);border:1px solid var(--border);border-radius:12px;}
  table{width:100%;border-collapse:collapse;}
  th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-soft);padding:14px 18px;border-bottom:1px solid var(--border);}
  td{padding:15px 18px;border-bottom:1px solid var(--border);font-size:13.5px;}
  tr:last-child td{border-bottom:none;}
  tr.row-link{cursor:pointer;}
  tr.row-link:hover{background:#F7F8F5;}
  .amt{font-family:'IBM Plex Mono',monospace;}

  /* Detail layout */
  .grid{display:grid;grid-template-columns:1.55fr 1fr;gap:22px;margin-top:8px;}
  .panel{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:22px 24px;margin-bottom:22px;}
  .panel h2{font-size:14px;font-weight:600;margin:0 0 18px 0;display:flex;align-items:center;gap:8px;}
  .panel h2 svg{width:15px;height:15px;color:var(--ink-soft);}
  .fields{display:grid;grid-template-columns:1fr 1fr;gap:18px 24px;}
  .field label{display:block;font-size:11.5px;color:var(--ink-soft);margin-bottom:5px;}
  .field .val{font-size:14.5px;font-weight:500;}
  .field .val.mono{font-size:14px;}

  select, input[type=number], input[type=text]{width:100%;font-family:'IBM Plex Sans',sans-serif;font-size:13.5px;padding:9px 11px;border-radius:7px;border:1px solid var(--border);background:var(--surface);color:var(--ink);}
  .subfield{margin-bottom:14px;}
  .subfield label{display:block;font-size:11.5px;color:var(--ink-soft);margin-bottom:6px;}

  .resolution-form{border-top:1px dashed var(--border);margin-top:16px;padding-top:16px;display:none;}
  .resolution-form.show{display:block;}
  .resolution-form .btn-row{margin-top:14px;}

  /* Activity */
  .activity-item{display:flex;gap:10px;margin-bottom:16px;}
  .avatar{width:28px;height:28px;border-radius:50%;background:#E4E7E1;color:var(--ink-soft);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0;}
  .avatar.system{background:var(--sidebar);color:var(--sidebar-text-active);}
  .activity-body{flex:1;}
  .activity-who{font-size:12.5px;font-weight:600;}
  .activity-when{font-size:11.5px;color:var(--ink-soft);font-weight:400;margin-left:6px;}
  .activity-note{background:#F5F6F3;border-radius:8px;padding:9px 12px;font-size:13px;margin-top:5px;line-height:1.5;}
  .note-input-row{display:flex;gap:8px;margin-top:4px;}
  .note-input-row input{flex:1;}

  /* Receipt signature element */
  .receipt{font-family:'IBM Plex Mono',monospace;background:#FAFAF6;border:1px solid var(--border);border-radius:2px;padding:18px 20px;margin-top:14px;font-size:12.5px;position:relative;
    background-image: radial-gradient(circle at 0 0, transparent 5px, #FAFAF6 5.5px), radial-gradient(circle at 100% 0, transparent 5px, #FAFAF6 5.5px);
  }
  .receipt::before, .receipt::after{content:"";position:absolute;top:-1px;bottom:-1px;width:12px;background-image:radial-gradient(circle, var(--paper) 4px, transparent 4.5px);background-size:12px 14px;background-repeat:repeat-y;}
  .receipt::before{left:-6px;}
  .receipt::after{right:-6px;}
  .receipt-title{text-transform:uppercase;letter-spacing:.08em;font-size:10.5px;color:var(--ink-soft);border-bottom:1px dashed var(--border);padding-bottom:10px;margin-bottom:10px;}
  .receipt-row{display:flex;justify-content:space-between;padding:3px 0;}
  .receipt-row.total{border-top:1px dashed var(--border);margin-top:6px;padding-top:8px;font-weight:600;}

  .back-link{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;color:var(--ink-soft);margin-bottom:14px;cursor:pointer;}
  .back-link:hover{color:var(--ink);}

  .toast{position:fixed;bottom:26px;right:26px;background:var(--sidebar);color:var(--sidebar-text-active);padding:13px 18px;border-radius:9px;font-size:13px;box-shadow:0 8px 24px rgba(0,0,0,0.18);display:flex;align-items:center;gap:9px;transform:translateY(12px);opacity:0;transition:all .25s ease;pointer-events:none;}
  .toast.show{transform:translateY(0);opacity:1;}
</style>
</head>
<body>
<div class="app">
  <div class="sidebar">
    <div class="brand">
      <div class="brand-mark">S</div>
      <div class="brand-name">Sole Support
        <small>Order Resolutions</small>
      </div>
    </div>
    <div class="nav">
      <div class="nav-item active" data-nav="dashboard">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="9" rx="1.5"/><rect x="14" y="3" width="7" height="5" rx="1.5"/><rect x="14" y="12" width="7" height="9" rx="1.5"/><rect x="3" y="16" width="7" height="5" rx="1.5"/></svg>
        Dashboard
      </div>
      <div class="nav-item" data-nav="orders">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 7l1.5-3h15L21 7"/><path d="M3 7h18v12a1 1 0 01-1 1H4a1 1 0 01-1-1V7z"/><path d="M9 11a3 3 0 006 0"/></svg>
        Orders &amp; Returns
      </div>
      <div class="nav-item" data-nav="customers">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="8" r="3.3"/><path d="M5 20c0-3.5 3-6 7-6s7 2.5 7 6"/></svg>
        Customers
      </div>
      <div class="nav-item" data-nav="team">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="8" cy="9" r="3"/><circle cx="17" cy="10" r="2.4"/><path d="M2.5 20c0-3 2.5-5.2 5.5-5.2s5.5 2.2 5.5 5.2"/><path d="M14.5 15.2c2.6.2 4.5 2.1 4.5 4.8"/></svg>
        Team
      </div>
    </div>

    <div class="order-search">
      <label for="order-search-input">Jump to order</label>
      <div class="order-search-row">
        <input type="text" id="order-search-input" placeholder="ORD-48213" autocomplete="off" onkeydown="if(event.key==='Enter')jumpToOrder()">
        <button class="order-search-go" onclick="jumpToOrder()" aria-label="Go">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
        </button>
      </div>
      <div class="order-search-hint" id="order-search-hint"></div>
    </div>
  </div>

  <div class="main" id="main"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const ORDERS = [
  { id:"ORD-48213", customer:"Priya Nandan", email:"priya.nandan@example.com", total:186.00, placed:"Jul 12, 2026", caseRef:"CASE-2291", issue:"Damaged item on arrival", status:"open", assigned:"Unassigned",
    items:[["Voyager Leather Loafer, Chestnut / 8","1","$158.00"],["Cushioned Insole Pair","1","$18.00"],["Shipping","—","$10.00"]],
    activity:[
      {who:"System", when:"Jul 12, 2026", note:"Customer reported a split seam on arrival. Photos attached to case.", system:true}
    ]},
  { id:"ORD-48097", customer:"Marcus Webb", email:"marcus.webb@example.com", total:92.50, placed:"Jul 9, 2026", caseRef:"CASE-2244", issue:"Wrong size shipped", status:"open", assigned:"Unassigned",
    items:[["Ridgeline Trail Runner, Slate / 10","1","$92.50"]],
    activity:[
      {who:"System", when:"Jul 9, 2026", note:"Customer received a size 9 instead of size 10. Requesting resolution.", system:true}
    ]},
  { id:"ORD-47990", customer:"Aiko Tanaka", email:"aiko.tanaka@example.com", total:64.00, placed:"Jul 6, 2026", caseRef:"CASE-2198", issue:"Order never arrived", status:"escalated", assigned:"Jordan P.",
    items:[["Everyday Canvas Slip-On, Ivory / 7","1","$64.00"]],
    activity:[
      {who:"System", when:"Jul 6, 2026", note:"Tracking shows delivered, customer disputes receipt.", system:true},
      {who:"Jordan P.", when:"Jul 8, 2026", note:"Escalated to carrier claims. Awaiting carrier response before resolving."}
    ]},
  { id:"ORD-48304", customer:"Leah Choi", email:"leah.choi@example.com", total:214.00, placed:"Jul 15, 2026", caseRef:"CASE-2312", issue:"Requesting refund — changed mind", status:"resolved", assigned:"Sam R.",
    items:[["Summit Suede Chelsea Boot, Cognac / 9","1","$214.00"]],
    activity:[
      {who:"System", when:"Jul 15, 2026", note:"Customer requested return within the 14-day window.", system:true},
      {who:"Sam R.", when:"Jul 16, 2026", note:"Issued full refund to original payment method.", resolution:{type:"Refund",amount:214.00,method:"Original payment method"}}
    ]},
];

let toastTimer;
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.classList.remove('show'), 3200);
}

function fmt(n){ return "$" + n.toFixed(2); }

function statusBadge(status){
  const label = status.charAt(0).toUpperCase()+status.slice(1);
  return `<span class="badge ${status}">${label}</span>`;
}

function renderDashboard(){
  const rows = ORDERS.map(o => `
    <tr class="row-link" onclick="location.hash='#/orders/${o.id}'">
      <td class="mono">${o.id}</td>
      <td>${o.customer}</td>
      <td>${o.issue}</td>
      <td class="amt">${fmt(o.total)}</td>
      <td>${statusBadge(o.status)}</td>
      <td>${o.placed}</td>
    </tr>`).join("");

  document.getElementById('main').innerHTML = `
    <div class="topline">
      <div>
        <div class="crumbs">SOLE SUPPORT</div>
        <h1>Order Resolutions</h1>
        <div class="sub">Open cases needing a refund, store credit, or follow-up.</div>
      </div>
    </div>
    <div class="card">
      <table>
        <thead><tr>
          <th>Order</th><th>Customer</th><th>Issue</th><th>Total</th><th>Status</th><th>Placed</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
  setActiveNav('dashboard');
}

function jumpToOrder(){
  const input = document.getElementById('order-search-input');
  const hint = document.getElementById('order-search-hint');
  const raw = input.value.trim().toUpperCase();
  if(!raw){ hint.textContent = ''; return; }
  const id = raw.startsWith('ORD-') ? raw : 'ORD-' + raw.replace(/^ORD/i,'');
  hint.textContent = '';
  location.hash = '#/orders/' + id;
}

function renderNotFound(id){
  document.getElementById('main').innerHTML = `
    <div class="back-link" onclick="location.hash='#/dashboard'">&larr; All orders</div>
    <div class="topline"><div>
      <div class="crumbs">SOLE SUPPORT</div>
      <h1>Order not found</h1>
      <div class="sub">There's no order matching <span class="mono">${id}</span> in this demo environment. Try one of: <span class="mono">${ORDERS.map(o=>o.id).join(', ')}</span>.</div>
    </div></div>`;
  setActiveNav('orders');
}
  document.getElementById('main').innerHTML = `
    <div class="topline"><div>
      <div class="crumbs">SOLE SUPPORT</div>
      <h1>${title}</h1>
      <div class="sub">This section isn't wired up in the demo — head back to the Dashboard to open an order.</div>
    </div></div>`;
}

function renderOrder(id){
  const o = ORDERS.find(x => x.id === id);
  if(!o){ renderNotFound(id); return; }

  const itemRows = o.items.map(i => `<tr><td>${i[0]}</td><td class="mono" style="text-align:center">${i[1]}</td><td class="amt" style="text-align:right">${i[2]}</td></tr>`).join("");

  const activityHtml = o.activity.map(a => `
    <div class="activity-item">
      <div class="avatar ${a.system?'system':''}">${a.system ? 'S' : a.who.split(' ').map(w=>w[0]).slice(0,2).join('')}</div>
      <div class="activity-body">
        <div><span class="activity-who">${a.who}</span><span class="activity-when">${a.when}</span></div>
        <div class="activity-note">${a.note}</div>
        ${a.resolution ? renderReceipt(o, a.resolution) : ''}
      </div>
    </div>`).join("");

  document.getElementById('main').innerHTML = `
    <div class="back-link" onclick="location.hash='#/dashboard'">&larr; All orders</div>
    <div class="topline">
      <div>
        <div class="crumbs">ORDERS &amp; RETURNS</div>
        <h1 class="mono" style="font-family:'IBM Plex Mono',monospace;font-size:24px;">${o.id}${statusBadge(o.status)}</h1>
        <div class="sub">Placed ${o.placed} · Case <span class="mono">${o.caseRef}</span> · ${o.issue}</div>
      </div>
      <div class="btn-row" id="action-buttons">
        ${o.status === 'resolved' ? '' : `
          <button class="btn" onclick="toggleForm('credit')">Issue Store Credit</button>
          <button class="btn btn-primary" onclick="toggleForm('refund')">Issue Refund</button>
        `}
      </div>
    </div>

    <div class="grid">
      <div>
        <div class="panel">
          <h2><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 7l1.5-3h15L21 7"/><path d="M3 7h18v12a1 1 0 01-1 1H4a1 1 0 01-1-1V7z"/></svg>Order Details</h2>
          <div class="fields">
            <div class="field"><label>Customer</label><div class="val">${o.customer}</div></div>
            <div class="field"><label>Order Total</label><div class="val mono">${fmt(o.total)}</div></div>
            <div class="field"><label>Email</label><div class="val">${o.email}</div></div>
            <div class="field"><label>Case Reference</label><div class="val mono">${o.caseRef}</div></div>
          </div>
          <div style="margin-top:20px;border-top:1px solid var(--border);padding-top:16px;">
            <table>
              <thead><tr><th>Item</th><th style="text-align:center">Qty</th><th style="text-align:right">Price</th></tr></thead>
              <tbody>${itemRows}</tbody>
            </table>
          </div>
        </div>
      </div>

      <div>
        <div class="panel">
          <h2><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>Resolution</h2>
          <div class="subfield">
            <label>Status</label>
            <select id="status-select" onchange="updateStatus('${o.id}', this.value)">
              <option value="open" ${o.status==='open'?'selected':''}>Open</option>
              <option value="escalated" ${o.status==='escalated'?'selected':''}>Escalated</option>
              <option value="resolved" ${o.status==='resolved'?'selected':''}>Resolved</option>
            </select>
          </div>
          <div class="subfield">
            <label>Assigned To</label>
            <select id="assigned-select" onchange="updateAssigned('${o.id}', this.value)">
              <option ${o.assigned==='Unassigned'?'selected':''}>Unassigned</option>
              <option ${o.assigned==='Jordan P.'?'selected':''}>Jordan P.</option>
              <option ${o.assigned==='Sam R.'?'selected':''}>Sam R.</option>
              <option ${o.assigned==='You'?'selected':''}>You</option>
            </select>
          </div>

          <div class="resolution-form" id="form-refund">
            <div class="subfield"><label>Refund Amount</label><input type="number" id="refund-amount" value="${o.total.toFixed(2)}" step="0.01"></div>
            <div class="subfield"><label>Refund Method</label>
              <select id="refund-method"><option>Original payment method</option><option>Gift card</option></select>
            </div>
            <div class="btn-row">
              <button class="btn btn-gold" onclick="confirmResolution('${o.id}','Refund')">Confirm Refund</button>
              <button class="btn" onclick="toggleForm('refund')">Cancel</button>
            </div>
          </div>

          <div class="resolution-form" id="form-credit">
            <div class="subfield"><label>Store Credit Amount</label><input type="number" id="credit-amount" value="${o.total.toFixed(2)}" step="0.01"></div>
            <div class="subfield"><label>Reason</label>
              <select id="credit-reason"><option>Damaged item</option><option>Wrong item shipped</option><option>Delivery issue</option><option>Customer goodwill</option></select>
            </div>
            <div class="btn-row">
              <button class="btn btn-gold" onclick="confirmResolution('${o.id}','Store Credit')">Confirm Store Credit</button>
              <button class="btn" onclick="toggleForm('credit')">Cancel</button>
            </div>
          </div>
        </div>

        <div class="panel">
          <h2><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>Activity &amp; Notes</h2>
          ${activityHtml}
          <div class="note-input-row">
            <input type="text" id="note-input" placeholder="Add a note or update...">
            <button class="btn" onclick="addNote('${o.id}')">Add</button>
          </div>
        </div>
      </div>
    </div>
  `;
  setActiveNav('orders');
}

function renderReceipt(o, r){
  return `
    <div class="receipt">
      <div class="receipt-title">Resolution Receipt · ${o.id}</div>
      <div class="receipt-row"><span>Order total</span><span>${fmt(o.total)}</span></div>
      <div class="receipt-row"><span>${r.type} issued</span><span>-${fmt(r.amount)}</span></div>
      <div class="receipt-row"><span>Method</span><span>${r.method}</span></div>
      <div class="receipt-row total"><span>Remaining balance</span><span>${fmt(Math.max(o.total - r.amount,0))}</span></div>
    </div>`;
}

function toggleForm(kind){
  const el = document.getElementById('form-' + kind);
  const other = document.getElementById('form-' + (kind === 'refund' ? 'credit' : 'refund'));
  if(other) other.classList.remove('show');
  el.classList.toggle('show');
}

function updateStatus(id, value){
  const o = ORDERS.find(x=>x.id===id);
  o.status = value;
  showToast(`Status updated to ${value.charAt(0).toUpperCase()+value.slice(1)}`);
  renderOrder(id);
}

function updateAssigned(id, value){
  const o = ORDERS.find(x=>x.id===id);
  o.assigned = value;
  showToast(`Assigned to ${value}`);
}

function confirmResolution(id, type){
  const o = ORDERS.find(x=>x.id===id);
  const isRefund = type === 'Refund';
  const amount = parseFloat(document.getElementById(isRefund ? 'refund-amount' : 'credit-amount').value) || 0;
  const method = isRefund ? document.getElementById('refund-method').value : 'Store credit';
  o.activity.push({
    who:"You", when:"Just now",
    note:`Issued ${fmt(amount)} ${type.toLowerCase()} for ${o.id}.`,
    resolution:{type, amount, method}
  });
  o.status = 'resolved';
  showToast(`${type} of ${fmt(amount)} issued`);
  renderOrder(id);
}

function addNote(id){
  const input = document.getElementById('note-input');
  if(!input.value.trim()) return;
  const o = ORDERS.find(x=>x.id===id);
  o.activity.push({who:"You", when:"Just now", note: input.value.trim()});
  renderOrder(id);
}

function setActiveNav(key){
  document.querySelectorAll('.nav-item').forEach(el=>{
    el.classList.toggle('active', el.dataset.nav === key);
  });
}

document.querySelectorAll('.nav-item').forEach(el=>{
  el.addEventListener('click', ()=>{
    const key = el.dataset.nav;
    if(key === 'dashboard') location.hash = '#/dashboard';
    else if(key === 'orders') location.hash = '#/dashboard';
    else location.hash = '#/placeholder/' + key;
  });
});

function router(){
  const hash = location.hash || '#/dashboard';
  const parts = hash.replace('#/','').split('/');
  if(parts[0] === 'orders' && parts[1]) renderOrder(parts[1]);
  else if(parts[0] === 'placeholder') renderPlaceholder(parts[1].charAt(0).toUpperCase()+parts[1].slice(1));
  else renderDashboard();
}
window.addEventListener('hashchange', router);
router();
</script>
</body>
</html>
